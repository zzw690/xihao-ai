<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玺小浩 AI法律助手</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-circle">玺</div>
      <div>
        <h2>玺小浩</h2>
        <p>AI法律助手</p>
      </div>
    </div>
  </header>

  <main id="chat-container">
    <div class="welcome">欢迎使用玺小浩AI法律助手，请输入您的问题</div>
  </main>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="请输入法律问题..." />
    <button id="sendBtn">发送</button>
  </div>

  <div class="lead-box">
    <h3>预约律师进一步分析</h3>
    <input id="name" placeholder="您的姓名" />
    <input id="phone" placeholder="联系电话" />
    <textarea id="case" placeholder="简单描述案件情况"></textarea>
    <button id="submitLead">提交预约</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
